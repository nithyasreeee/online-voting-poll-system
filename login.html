<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Voting Poll System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-brand">Online Voting Poll System</div>
            <nav>
                <a href="index.html">Home</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container auth-container">
            <h2 class="section-title">Login to Your Account</h2>
            <form id="formLogin">
                <div class="role-selector">
                    <div class="role-option">
                        <input type="radio" id="roleUser" name="role" value="user" checked>
                        <label for="roleUser">👤 User</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="roleAdmin" name="role" value="admin">
                        <label for="roleAdmin">👨‍💼 Admin</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            <p class="text-center margin-top">Don't have an account? <a href="index.html">Sign Up</a></p>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Online Voting Poll System. All rights reserved.</p>
    </footer>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
